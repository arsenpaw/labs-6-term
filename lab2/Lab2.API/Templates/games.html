<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎮 Games Library</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 2rem;
        }
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        header p { color: #94a3b8; margin-top: .4rem; font-size: .95rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #1e1e30;
            border: 1px solid #2d2d45;
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: .75rem;
            transition: transform .2s, box-shadow .2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(129,140,248,.2);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #c7d2fe;
        }
        .card-desc {
            font-size: .875rem;
            color: #94a3b8;
            line-height: 1.5;
            flex-grow: 1;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
            font-size: .8rem;
        }
        .badge {
            padding: .25rem .65rem;
            border-radius: 9999px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-genre    { background: #312e81; color: #a5b4fc; }
        .badge-pub      { background: #1e3a5f; color: #7dd3fc; }
        .badge-price    { background: #14532d; color: #86efac; }
        .badge-tag      { background: #2d1b4e; color: #d8b4fe; }
        .badge-inactive { background: #450a0a; color: #fca5a5; }
        .badge-active   { background: #052e16; color: #6ee7b7; }
        .card-id {
            font-size: .7rem;
            color: #475569;
            font-family: monospace;
            word-break: break-all;
        }
        .empty {
            text-align: center;
            padding: 4rem;
            color: #475569;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 Games Library</h1>
        <p>Browse all registered games</p>
    </header>
    {{CONTENT}}
</body>
</html>
